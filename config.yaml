alarm:
  enabled: false
  time: "07:00"

snooze:
  duration_minutes: 9

radio:
  stations:
    - name: "NRK P1"
      url: "https://lyd.nrk.no/nrk_radio_p1_ostlandssendingen_mp3_h"
    - name: "NRK P2"
      url: "https://lyd.nrk.no/nrk_radio_p2_mp3_h"
    - name: "NRK P3"
      url: "https://lyd.nrk.no/nrk_radio_p3_mp3_h"
    - name: "BBC World Service"
      url: "https://stream.live.vc.bbcmedia.co.uk/bbc_world_service"
  default_station: 0
  volume: 70

led:
  brightness: 80
  # Strip type: "WS2812" (RGB, 3 channels) or "SK6812" (RGBW, 4 channels).
  strip_type: WS2812
  num_leds: 10
  # Fade duration (ms) when the LED button ramps the strip on or off.
  ramp_ms: 400

splitflap:
  # Per-module step offsets for mechanical tuning (filled in during hardware bench)
  module_offsets: [0, 0, 0, 0]
  magnet_position: 730
  speed_rpm: 10

hardware:
  i2c_bus: 3
  buttons:
    snooze_pin: 17
    led_pin: 27
    double_press_ms: 400
    # Seconds the LEDs stay at full brightness after the button is released
    # before fading off.
    led_hold_seconds: 5
  ads1115:
    address: 0x49
    poll_hz: 5
  amp:
    address: 0x4B
    # Hardware gain ceiling, 0–63 in MAX9744 steps. User volumes 0–100 %
    # are mapped to 0..max_volume so the amp can never run hotter than
    # this regardless of what any software layer asks for.
    max_volume: 40
