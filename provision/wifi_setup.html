<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Splitflap Clock — WiFi Setup</title>
  <style>
    :root { --accent: #e8a020; --bg: #111; --surface: #1e1e1e; --text: #f0f0f0; --dim: #888; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif;
           max-width: 420px; margin: 0 auto; padding: 32px 20px; }
    h1 { color: var(--accent); font-size: 1.3rem; margin-bottom: 6px; }
    p  { color: var(--dim); font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.85rem; color: var(--dim); margin-bottom: 6px; }
    select, input[type="password"] {
      width: 100%; background: var(--surface); border: none; border-radius: 10px;
      color: var(--text); font-size: 1rem; padding: 14px; margin-bottom: 16px;
      min-height: 48px;
    }
    button {
      width: 100%; background: var(--accent); color: #000; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; padding: 16px; cursor: pointer; min-height: 52px;
    }
    button:active { opacity: 0.8; }
    .or { text-align: center; color: var(--dim); font-size: 0.85rem; margin: 16px 0; }
    input[type="text"] {
      width: 100%; background: var(--surface); border: none; border-radius: 10px;
      color: var(--text); font-size: 1rem; padding: 14px; margin-bottom: 16px;
      min-height: 48px;
    }
    #manual { display: none; }
  </style>
</head>
<body>
  <h1>WiFi Setup</h1>
  <p>Connect your Splitflap Clock to your home network.</p>

  <form method="POST" action="/connect">
    <label for="ssid">Select network</label>
    <select id="ssid" name="ssid" onchange="document.getElementById('manual').style.display='none'">
      <!-- NETWORK_OPTIONS -->
    </select>

    <div class="or">— or enter manually —</div>

    <label for="ssid-manual">Network name (SSID)</label>
    <input type="text" id="ssid-manual" placeholder="My Network"
           oninput="syncManual(this.value)">

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Leave blank for open networks">

    <button type="submit">Connect</button>
  </form>

  <script>
    function syncManual(val) {
      if (val) document.getElementById('ssid').value = '';
      document.getElementById('ssid').name = val ? '' : 'ssid';
      document.getElementById('ssid-manual').name = val ? 'ssid' : '';
    }
  </script>
</body>
</html>
