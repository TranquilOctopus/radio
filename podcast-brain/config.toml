# podcast-brain configuration
# Copy this file to your working directory and edit as needed.
# Fields marked REQUIRED must be set before first use.
# All paths are relative to this file's directory unless absolute.

[paths]
# Where downloaded audio files are stored
audio_dir = "data/audio"
# Where transcript JSON files are stored
transcripts_dir = "data/transcripts"
# Kuzu graph database directory
graph_dir = "data/graph.kuzu"
# SQLite job queue + budget ledger
db_path = "data/jobs.db"
# Obsidian-compatible markdown vault
vault_dir = "vault"

[compute]
# Whisper backend: auto | mlx | faster-whisper-cuda | faster-whisper-cpu
whisper_backend = "auto"
# Whisper model size (large-v3 recommended; distil-large-v3 for low VRAM)
whisper_model = "large-v3"
# PyTorch device for diarization / embeddings: auto | mps | cuda | cpu
torch_device = "auto"
# Serialize Whisper unload before LLM load to stay under VRAM budget.
# "auto" = true on <16 GB VRAM, false otherwise.
serialize_models = "auto"

[backlog]
# Maximum episodes across all shows to pipeline per day
max_episodes_per_day = 5
# oldest_first | newest_first | interleaved
strategy = "oldest_first"
# Per-show daily cap (0 = unlimited within max_episodes_per_day)
per_show_daily_cap = 2

[extract]
# backend: "local" (ollama) or "claude" (Haiku fallback)
backend = "local"
# Ollama model for local extraction
local_model = "qwen2.5:14b-instruct-q4_K_M"
# Ollama endpoint
local_endpoint = "http://localhost:11434"
# JSON output mode: "grammar" (GBNF) | "json_schema" (ollama native)
json_mode = "json_schema"
# Route this percentage of chunks to Claude Haiku for QA spot-checking (0 = off)
spot_check_pct = 0
# Claude model used when backend = "claude" or for spot-checks
claude_model = "claude-haiku-4-5-20251001"

[notion]
# Set enabled = true and fill the remaining fields to push summaries to Notion.
enabled = false
# REQUIRED if enabled: set via env var NOTION_TOKEN or fill in here (not recommended)
token = "${NOTION_TOKEN}"
# REQUIRED if enabled: Notion database IDs (share databases with your integration)
episodes_db_id = ""
concepts_db_id = ""
weekly_parent_page_id = ""
# "push" = sync after each ingest; "reconcile" = nightly reconciliation
sync_mode = "push"

[budget]
# Hard monthly cap in USD. Pipeline refuses new Sonnet/Haiku calls once exceeded.
monthly_cap_usd = 20.0
# Warn (but don't stop) at this fraction of the cap
warn_at_pct = 80
# Claude model used for episode summaries and weekly synthesis
summarize_model = "claude-sonnet-4-6"

[transcribe]
# Enable speaker diarization (requires HuggingFace token + pyannote-audio)
diarize = false
# REQUIRED if diarize = true: HuggingFace token with access to pyannote/speaker-diarization
# hf_token = "${HF_TOKEN}"
# Language hint for Whisper (empty = auto-detect)
language = ""
# Per-feed override: language for episode summaries. "source" | "en"
summary_lang = "source"

[summarize]
# Approximate target length for episode wiki page in words
episode_summary_words = 600
# Approximate target length for weekly digest in words
weekly_digest_words = 1200
# Exclude banter-style shows from the weekly digest by default
exclude_banter_from_digest = true

[chunker]
# Target chunk length in seconds (~3 minutes keeps LLM context manageable)
target_seconds = 180
# Overlap carried into the next chunk so cross-boundary context isn't lost
overlap_seconds = 15

[ingest.podcastindex]
# REQUIRED for `feed backfill` and PodcastIndex-based feed resolution.
# Free credentials: https://podcastindex.org/signup
api_key = ""
api_secret = ""
user_agent = "podcast-brain/0.1"
# Cap on episodes pulled per backfill request (PI hard cap is ~1000)
max_episodes_per_request = 1000
